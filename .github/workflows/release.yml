name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  packages: read

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "gradle"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Configure GitHub Packages credentials
        run: |
          mkdir -p ~/.gradle
          {
            echo "github.user=${{ github.actor }}"
            echo "github.token=${{ secrets.GITHUB_TOKEN }}"
          } > ~/.gradle/gradle.properties

      - name: Build shadow JAR
        run: |
          tag_name="${GITHUB_REF#refs/tags/}"
          version_override="${tag_name#v}"
          ./gradlew shadowJar -PversionOverride="$version_override"

      - name: Upload JAR to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag_name="${GITHUB_REF#refs/tags/}"
          gh release upload "$tag_name" build/libs/plugin-grounds-platform-*-all.jar --clobber
